spring.application.name=microservice
spring.jpa.hibernate.ddl-auto=update
# spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/emp
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASS}
spring.datasource.url=jdbc:mysql://localhost:3306/emp
spring.datasource.username=root
spring.datasource.password=Root@1234
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE

# File upload / request size limits
# Allow uploads up to 5MB and configure Tomcat to accept larger POST bodies
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Tomcat-specific settings (bytes). Set to 5MB to match multipart limits.
server.tomcat.max-swallow-size=5242880
server.tomcat.max-http-post-size=5242880