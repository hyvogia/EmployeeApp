<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Bootstrap User Management Data Table</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto|Varela+Round">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" type="text/css">

</head>

<body>
    <div class="container-xl">
        <div class="table-responsive">
            <div class="table-wrapper">
                <div class="table-title">
                    <div class="row">
                        <div class="col-sm-5">
                            <h2>Employee <b>Management</b></h2>
                        </div>
                        <div class="col-sm-7">
                            <a href="#" th:href="@{/addnew}" class="btn btn-secondary">
                                <i class="material-icons">&#xE147;</i>
                                <span>Add New User</span>
                            </a>
                            <a th:href="@{/export}" class="btn btn-secondary" target="_blank">
                                <i class="material-icons">&#xE24D;</i>
                                <span>Export to Excel</span>
                            </a>
                        </div>
                    </div>
                </div>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Date Created</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employee:${allemplist}">
                            <td th:text="${employee.id}">1</td>
                            <td>
                                <img th:src="@{/avatar/{id}(id=${employee.id})}" class="avatar" alt="Avatar"
                                    th:attr="onerror=|this.onerror=null;this.src='https://ui-avatars.com/api/?name=${#strings.replace(employee.name,' ','+')}&size=40'|">
                                <a href="#" th:text="${employee.name}"></a>
                            </td>
                            <td><a th:text="${employee.createdDate}"></a></td>
                            <td><a th:text="${employee.role}"></a></td>
                            <td>
                                <span th:class="'status ' + (
                                    ${employee.status}=='Active' ? 'text-success' : (
                                    ${employee.status}=='Pending' ? 'text-warning' : (
                                    ${employee.status}=='Suspended' ? 'text-danger' : 'text-info')))">
                                    &bull;
                                </span>
                                <span th:text="${employee.status}">Status</span>
                            </td>
                            <td>
                                <a href="#" th:href="@{/showFormForUpdate/{id}(id=${employee.id})}" class="settings"
                                    title="Settings" data-toggle="tooltip">
                                    <i class="material-icons">&#xE8B8;</i>
                                </a>
                                <a href="#" th:href="@{/deleteEmployee/{id}(id=${employee.id})}" class="delete"
                                    title="Delete" data-toggle="tooltip">
                                    <i class="material-icons">&#xE5C9;</i>
                                </a>
                            </td>
                        </tr>

                    </tbody>
                </table>
                <div class="clearfix">
                    <div class="hint-text"><span id="showingText">Showing 0 to 0 of 0 entries</span></div>
                    <ul class="pagination" id="pagination"></ul>
                </div>
            </div>
        </div>
    </div>
</body>
<footer style="text-align:center; padding:12px 0; font-size:12px; color:#666;">
    <div>
        Starter template from <a
            href="https://www.tutorialrepublic.com/snippets/preview.php?topic=bootstrap&file=user-management-data-table"
            target="_blank" rel="noopener">Tutorial Republic</a>
    </div>
</footer>
<script th:src="@{/js/script.js}" src="/js/script.js"></script>

</html>
