<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Bootstrap User Management Data Table</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto|Varela+Round">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    <style>
        body {
            color: #566787;
            background: #f5f5f5;
            font-family: 'Varela Round', sans-serif;
            font-size: 13px;
        }

        .table-responsive {
            margin: 30px 0;
        }

        .table-wrapper {
            min-width: 1000px;
            background: #fff;
            padding: 20px 25px;
            border-radius: 3px;
            box-shadow: 0 1px 1px rgba(0, 0, 0, .05);
        }

        .table-title {
            padding-bottom: 15px;
            background: #299be4;
            color: #fff;
            padding: 16px 30px;
            margin: -20px -25px 10px;
            border-radius: 3px 3px 0 0;
        }

        .table-title h2 {
            margin: 5px 0 0;
            font-size: 24px;
        }

        .table-title .btn {
            color: #566787;
            float: right;
            font-size: 13px;
            background: #fff;
            border: none;
            min-width: 50px;
            border-radius: 2px;
            border: none;
            outline: none !important;
            margin-left: 10px;
        }

        .table-title .btn:hover,
        .table-title .btn:focus {
            color: #566787;
            background: #f2f2f2;
        }

        .table-title .btn i {
            float: left;
            font-size: 21px;
            margin-right: 5px;
        }

        .table-title .btn span {
            float: left;
            margin-top: 2px;
        }

        table.table tr th,
        table.table tr td {
            border-color: #e9e9e9;
            padding: 12px 15px;
            vertical-align: middle;
        }

        table.table tr th:first-child {
            width: 60px;
        }

        table.table tr th:last-child {
            width: 100px;
        }

        table.table-striped tbody tr:nth-of-type(odd) {
            background-color: #fcfcfc;
        }

        table.table-striped.table-hover tbody tr:hover {
            background: #f5f5f5;
        }

        table.table th i {
            font-size: 13px;
            margin: 0 5px;
            cursor: pointer;
        }

        table.table td:last-child i {
            opacity: 0.9;
            font-size: 22px;
            margin: 0 5px;
        }

        table.table td a {
            font-weight: bold;
            color: #566787;
            display: inline-block;
            text-decoration: none;
        }

        table.table td a:hover {
            color: #2196F3;
        }

        table.table td a.settings {
            color: #2196F3;
        }

        table.table td a.delete {
            color: #F44336;
        }

        table.table td i {
            font-size: 19px;
        }

        table.table .avatar {
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 10px;
        }

        /* Force avatar display to 40x40 while preserving aspect */
        table.table .avatar {
            width: 40px;
            height: 40px;
            object-fit: cover;
            display: inline-block;
        }

        .status {
            font-size: 30px;
            margin: 2px 2px 0 0;
            display: inline-block;
            vertical-align: middle;
            line-height: 10px;
        }

        .text-success {
            color: #10c469;
        }

        .text-info {
            color: #62c9e8;
        }

        .text-warning {
            color: #FFC107;
        }

        .text-danger {
            color: #ff5b5b;
        }

        .pagination {
            float: right;
            margin: 0 0 5px;
        }

        .pagination li a {
            border: none;
            font-size: 13px;
            min-width: 30px;
            min-height: 30px;
            color: #999;
            margin: 0 2px;
            line-height: 30px;
            border-radius: 2px !important;
            text-align: center;
            padding: 0 6px;
        }

        .pagination li a:hover {
            color: #666;
        }

        .pagination li.active a,
        .pagination li.active a.page-link {
            background: #03A9F4;
        }

        .pagination li.active a:hover {
            background: #0397d6;
        }

        .pagination li.disabled i {
            color: #ccc;
        }

        .pagination li i {
            font-size: 16px;
            padding-top: 6px
        }

        .hint-text {
            float: left;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
    <script>
        $(document).ready(function () {
            $('[data-toggle="tooltip"]').tooltip();
        });
    </script>
</head>

<body>
    <div class="container-xl">
        <div class="table-responsive">
            <div class="table-wrapper">
                <div class="table-title">
                    <div class="row">
                        <div class="col-sm-5">
                            <h2>Employee <b>Management</b></h2>
                        </div>
                        <div class="col-sm-7">
                            <a href="#" th:href="@{/addnew}" class="btn btn-secondary">
                                <i class="material-icons">&#xE147;</i>
                                <span>Add New User</span>
                            </a>
                            <a th:href="@{/export}" class="btn btn-secondary" target="_blank">
                                <i class="material-icons">&#xE24D;</i>
                                <span>Export to Excel</span>
                            </a>
                        </div>
                    </div>
                </div>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Date Created</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employee:${allemplist}">
                            <td th:text="${employee.id}">1</td>
                            <td>
                                  <img th:src="@{/avatar/{id}(id=${employee.id})}" class="avatar" alt="Avatar"
                                      th:attr="onerror=|this.onerror=null;this.src='https://ui-avatars.com/api/?name=${#strings.replace(employee.name,' ','+')}&size=40'|">
                                <a href="#" th:text="${employee.name}"></a>
                            </td>
                            <td><a th:text="${employee.createdDate}"></a></td>
                            <td><a th:text="${employee.role}"></a></td>
                            <td>
                                <span th:class="'status ' + (
                                    ${employee.status}=='Active' ? 'text-success' : (
                                    ${employee.status}=='Pending' ? 'text-warning' : (
                                    ${employee.status}=='Suspended' ? 'text-danger' : 'text-info')))">
                                    &bull;
                                </span>
                                <span th:text="${employee.status}">Status</span>
                            </td>
                            <td>
                                <a href="#" th:href="@{/showFormForUpdate/{id}(id=${employee.id})}" class="settings" title="Settings" data-toggle="tooltip">
                                    <i class="material-icons">&#xE8B8;</i>
                                </a>
                                <a href="#" th:href="@{/deleteEmployee/{id}(id=${employee.id})}" class="delete" title="Delete" data-toggle="tooltip">
                                    <i class="material-icons">&#xE5C9;</i>
                                </a>
                            </td>
                        </tr>
                        
                    </tbody>
                </table>
                <div class="clearfix">
                    <div class="hint-text"><span id="showingText">Showing 0 to 0 of 0 entries</span></div>
                    <ul class="pagination" id="pagination"></ul>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<footer style="text-align:center; padding:12px 0; font-size:12px; color:#666;">
    <div>
        Starter template from <a href="https://www.tutorialrepublic.com/snippets/preview.php?topic=bootstrap&file=user-management-data-table" target="_blank" rel="noopener">Tutorial Republic</a>
    </div>
</footer>

<script>
    (function($){
        $(function(){
            const pageSize = 10;
            const $rows = $('table.table tbody tr');
            const total = $rows.length;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));

            function renderPagination(current){
                const $p = $('#pagination').empty();
                if(totalPages <= 1) return;

                const $prev = $('<li class="page-item"><a href="#" class="page-link">Previous</a></li>');
                if (current === 1) {
                    $prev.addClass('disabled');
                }
                $prev.on('click', function(e) {
                    e.preventDefault();
                    if (current > 1) {
                        renderPage(current - 1);
                    }
                });
                $p.append($prev);

                for (let i = 1; i <= totalPages; i++) {
                    const $li = $(`<li class="page-item ${i===current? 'active' : ''}"><a href="#" class="page-link">${i}</a></li>`);
                    (function(page) {
                        $li.on('click', function(e) {
                            e.preventDefault();
                            renderPage(page);
                        });
                    })(i);
                    $p.append($li);
                }

                const $next = $('<li class="page-item"><a href="#" class="page-link">Next</a></li>');
                if (current === totalPages) {
                    $next.addClass('disabled');
                }
                $next.on('click', function(e) {
                    e.preventDefault();
                    if (current < totalPages) {
                        renderPage(current + 1);
                    }
                });
                $p.append($next);
            }

            function renderPage(page){
                const start = (page - 1) * pageSize;
                const end = start + pageSize;
                $rows.hide().slice(start, end).show();
                let showingStart;
                if (total === 0) {
                    showingStart = 0;
                } else {
                    showingStart = start + 1;
                }
                const showingEnd = Math.min(end, total);
                $('#showingText').text(`Showing ${showingStart} to ${showingEnd} of ${total} entries`);
                renderPagination(page);
            }

            // initialize
            renderPage(1);
        });
    })(jQuery);
</script>
