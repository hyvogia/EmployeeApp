<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head>
    <meta charset="ISO-8859-1">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Employee Management System</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto|Varela+Round">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
        body {
            color: #566787;
            background: #f5f5f5;
            font-family: 'Varela Round', sans-serif;
            font-size: 13px;
        }

        .form-wrapper {
            max-width: 900px;
            background: #fff;
            margin: 30px auto;
            padding: 20px 25px;
            border-radius: 3px;
            box-shadow: 0 1px 1px rgba(0, 0, 0, .05);
        }

        .form-title {
            padding-bottom: 15px;
            background: #299be4;
            color: #fff;
            padding: 16px 30px;
            margin: -20px -25px 25px;
            border-radius: 3px 3px 0 0;
        }

        .form-title h2 {
            margin: 0;
            font-size: 24px;
        }

        .form-title p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #eaf6ff;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            height: 45px;
            border-radius: 2px;
            box-shadow: none !important;
            border-color: #dddddd;
        }

        .form-control:focus {
            border-color: #299be4;
        }

        .btn-custom {
            color: #fff;
            background: #299be4;
            border: none;
            min-width: 140px;
            height: 42px;
            border-radius: 2px;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-custom:hover,
        .btn-custom:focus {
            background: #1d8cd8;
            color: #fff;
        }

        .back-link {
            color: #299be4;
            font-weight: 500;
            text-decoration: none;
        }

        .back-link:hover {
            color: #1d6fa5;
            text-decoration: none;
        }

        hr {
            margin: 25px 0 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="form-title">
                <h2>Employee <b>Management</b></h2>
                <p>Update Employee</p>
            </div>

            <form action="#" th:action="@{/save}" th:object="${employee}" method="POST" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control">
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" th:field="*{role}" class="form-control">
                        <option value="">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Publisher">Publisher</option>
                        <option value="Reviewer">Reviewer</option>
                        <option value="Moderator">Moderator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" th:field="*{status}" class="form-control">
                        <option value="">Select Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="Pending">Pending</option>
                        <option value="Suspended">Suspended</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="createdDate">Created Date</label>
                    <input type="date" id="createdDate" th:field="*{createdDate}" class="form-control">
                </div>

                <div class="form-group">
                    <label for="avatar">Avatar</label>
                    <input type="file" id="avatar" name="avatarFile" accept="image/*" class="form-control">
                    <small class="form-text text-muted">Allowed: JPG, PNG, GIF. Max size: 2MB.</small>
                </div>

                <button type="submit" class="btn btn-custom">Update Employee</button>
            </form>

            <hr>

            <a th:href="@{/}" class="back-link">Back to Employee List</a>
        </div>
    </div>
</body>

</html>

<script>
    (function(){
        const MAX_BYTES = 2 * 1024 * 1024; // 2MB
        const fileInput = document.getElementById('avatar');
        if (fileInput) {
            fileInput.addEventListener('change', function(e){
                const f = e.target.files[0];
                if (!f) return;
                if (!f.type.startsWith('image/')) {
                    alert('Please select an image file (JPG/PNG/GIF).');
                    e.target.value = '';
                    return;
                }
                if (f.size > MAX_BYTES) {
                    alert('Image too large. Maximum allowed size is 2MB.');
                    e.target.value = '';
                }
            });
        }
    })();
</script>
