<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head>
    <meta charset="ISO-8859-1">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Employee Management System</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto|Varela+Round">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" type="text/css">
</head>

<body>
    <div class="container">
        <div class="form-wrapper">

            <div class="form-title">
                <h2>Employee <b>Management</b></h2>
                <p>Add New Employee</p>
            </div>

            <form action="#" th:action="@{/save}" th:object="${employee}" method="POST" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Employee Name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                        placeholder="Employee Email">
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" th:field="*{role}" class="form-control">
                        <option value="">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Publisher">Publisher</option>
                        <option value="Reviewer">Reviewer</option>
                        <option value="Moderator">Moderator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" th:field="*{status}" class="form-control">
                        <option value="">Select Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="Pending">Pending</option>
                        <option value="Suspended">Suspended</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="createdDate">Created Date</label>
                    <input type="date" id="createdDate" th:field="*{createdDate}" class="form-control">
                </div>

                <div class="form-group">
                    <label for="avatar">Avatar</label>
                    <input type="file" id="avatar" name="avatarFile" accept="image/*" class="form-control">
                    <small class="form-text text-muted">Allowed: JPG, PNG, GIF. Max size: 2MB.</small>
                </div>

                <button type="submit" class="btn btn-custom">Save Employee</button>
            </form>

            <hr>

            <a th:href="@{/}" class="back-link">Back to Employee List</a>

        </div>
    </div>
</body>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
<script th:src="@{/js/script.js}" src="/js/script.js"></script>

</html>
